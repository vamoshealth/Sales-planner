<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vamos Health — Sales Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f5;
      --color-background-tertiary: #eeeeee;
      --color-background-info: #e6f1fb;
      --color-background-success: #eaf3de;
      --color-background-warning: #faeeda;
      --color-background-danger: #fcebeb;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #6b7280;
      --color-text-tertiary: #9ca3af;
      --color-text-info: #185fa5;
      --color-text-success: #27500a;
      --color-text-warning: #633806;
      --color-text-danger: #791f1f;
      --color-border-tertiary: rgba(0,0,0,0.10);
      --color-border-secondary: rgba(0,0,0,0.20);
      --color-border-primary: rgba(0,0,0,0.30);
      --color-border-info: #b5d4f4;
      --color-border-success: #c0dd97;
      --color-border-warning: #fac775;
      --color-border-danger: #f09595;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-serif: Georgia, serif;
      --font-mono: 'Courier New', monospace;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --border-radius-xl: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1e1e1e;
        --color-background-secondary: #2a2a2a;
        --color-background-tertiary: #333333;
        --color-text-primary: #f0f0f0;
        --color-text-secondary: #a0a0a0;
        --color-text-tertiary: #6b6b6b;
        --color-border-tertiary: rgba(255,255,255,0.10);
        --color-border-secondary: rgba(255,255,255,0.20);
        --color-border-primary: rgba(255,255,255,0.30);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
