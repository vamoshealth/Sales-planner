databases:
  - name: vamos-sales-db
    databaseName: vamos_sales
    user: vamos_admin
    plan: free

services:
  - type: web
    name: vamos-sales-planner
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vamos-sales-db
          property: connectionString
